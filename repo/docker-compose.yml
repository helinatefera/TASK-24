services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: lenswork
      # Development-only defaults so `docker compose up` works out of the box.
      # PRODUCTION: override via .env (copy .env.example, regenerate secrets).
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-lenswork_dev}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-devPass_NOT_FOR_PROD_0123456789}
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok || quit(1)"]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 60s

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    # Backend port is not exposed to host by default — access via nginx TLS proxy at :3443
    # Uncomment below for direct HTTP access during development:
    # ports:
    #   - "3001:3001"
    expose:
      - "3001"
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      MONGODB_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-lenswork_dev}:${MONGO_INITDB_ROOT_PASSWORD:-devPass_NOT_FOR_PROD_0123456789}@mongo:27017/lenswork?authSource=admin
      # Development-only defaults so `docker compose up` works out of the box.
      # PRODUCTION: override via .env. validateConfig() enforces min length at runtime.
      JWT_SECRET: ${JWT_SECRET:-devONLY_jkL3mN4pQ5rS6tU7vW8xY9zA0bC1dE2fG3hI4jK5lM6nO7pQ8rS9tU0vW1x}
      MASTER_ENCRYPTION_KEY: ${MASTER_ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      BCRYPT_ROUNDS: "12"
      RATE_LIMIT_PER_MIN: "${RATE_LIMIT_PER_MIN:-60}"
      REPORTS_PER_DAY: "10"
      IDLE_TIMEOUT_MS: "900000"
      ABSOLUTE_EXPIRY_MS: "86400000"
      NONCE_WINDOW_MS: "600000"
      CLOCK_SKEW_MS: "120000"
      LOCK_HOURS: "${LOCK_HOURS:-48}"
      UPLOAD_DIR: /app/uploads
      LOG_LEVEL: info
    volumes:
      - server_uploads:/app/uploads
      - ./unit_tests:/unit_tests:ro
      - ./API_tests:/API_tests:ro
    healthcheck:
      test: ["CMD", "node", "-e", "const http=require('http');const r=http.request({hostname:'localhost',port:3001,path:'/api/health',timeout:2000},res=>{process.exit(res.statusCode===200?0:1)});r.on('error',()=>process.exit(1));r.end()"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "3443:443"
      - "3080:80"
    depends_on:
      server:
        condition: service_healthy

volumes:
  mongo_data:
  server_uploads:
